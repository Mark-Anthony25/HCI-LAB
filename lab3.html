<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <style>
       body{
        background-color: #f0f2f5;
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
       }
       .container{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
       }
       .form-box{
        background-color: white;
        padding: 30px;
        width: 350px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
       }
       h2{
        text-align: center;
        margin-bottom: 20px;
       }
       label{
        font-weight: bold;
       }
       input{
        width: 100%;
        padding: 10px;
        margin-top 5px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
       }


    </style>

</head>

<body>

    <div class="container">

        <div class="form-box">

            <h2>Login</h2>

            <form action="hello.html" method="post">

                <label for="username">Username</label>
                <input id="username" name="username" type="text" required>

                <label for="password">Password</label>
                <input id="password" name="password" type="password" required>

                <button type="submit">Login</button>

            </form>

            <p>New account? <a href="register.html">Register here</a></p>

        </div>

    </div>

</body>

</html>
